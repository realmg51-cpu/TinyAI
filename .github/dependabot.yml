version: 2
updates:
  # NuGet dependencies
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "automated-pr"
      - "nuget"
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 5
    target-branch: "main"
    pull-request-branch-name:
      separator: "-"
    ignore:
      - dependency-name: "Microsoft.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "System.*"
        update-types: ["version-update:semver-major"]
    reviewers:
      - "your-github-username"
    assignees:
      - "your-github-username"
    rebase-strategy: "auto"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "automated-pr"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 5
    target-branch: "main"
    reviewers:
      - "your-github-username"
    assignees:
      - "your-github-username"
    rebase-strategy: "auto"
    ignore: []  # Don't ignore any GitHub Actions updates
