name: Build, Release and Test

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_NAME: 'TinyAI'
  PROJECT_PATH: 'src/Main/TinyAI.csproj'      # Đường dẫn đúng tới csproj
  SOLUTION_PATH: 'TinyAI.sln'                  # Solution ở thư mục gốc
  OUTPUT_DIR: 'publish'

jobs:
  # Job 1: Build và Test
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Debug - List files
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Directory structure ==="
        ls -R
        echo "=== Looking for csproj ==="
        find . -name "*.csproj"

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build with ${{ matrix.configuration }}
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ matrix.configuration }} --no-restore

    - name: Test
      run: dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ matrix.configuration }} --no-build --verbosity normal

    - name: Upload build artifacts (Debug)
      if: matrix.configuration == 'Debug'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-Debug
        path: |
          **/bin/Debug/**/*.dll
          **/bin/Debug/**/*.pdb
          **/bin/Debug/**/*.exe
        retention-days: 7

  # Job 2: Publish self-contained executable
  publish-self-contained:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            extension: .exe
          - os: windows-latest
            runtime: win-arm64
            extension: .exe
          - os: ubuntu-latest
            runtime: linux-x64
            extension: 
          - os: ubuntu-latest
            runtime: linux-arm64
            extension: 
          - os: macos-latest
            runtime: osx-x64
            extension: 
          - os: macos-latest
            runtime: osx-arm64
            extension: 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Get version from tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Version: $VERSION"
      shell: bash

    - name: Publish self-contained for ${{ matrix.runtime }}
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          --configuration Release \
          --runtime ${{ matrix.runtime }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:Version=${{ env.VERSION }} \
          -p:FileVersion=${{ env.VERSION }} \
          -p:AssemblyVersion=${{ env.VERSION }} \
          --output ${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}
      
    - name: Rename executable
      run: |
        cd ${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Windows: rename .exe file
          mv *.exe "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}${{ matrix.extension }}" 2>/dev/null || true
        else
          # Linux/macOS: rename file (no extension)
          if [ -f "${{ env.PROJECT_NAME }}" ]; then
            mv "${{ env.PROJECT_NAME }}" "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}"
          fi
        fi
        cd -
      shell: bash

    - name: Create zip archive
      run: |
        cd ${{ env.OUTPUT_DIR }}
        zip -r "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.zip" "${{ matrix.runtime }}"
        cd -

    - name: Upload artifact for release
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}
        path: ${{ env.OUTPUT_DIR }}/${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.zip

  # Job 3: Tạo Release
  create-release:
    needs: publish-self-contained
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: ${{ env.PROJECT_NAME }}-*-v${{ env.VERSION }}
        merge-multiple: true

    - name: Generate checksums
      run: |
        cd artifacts
        for file in *.zip; do
          if [ -f "$file" ]; then
            sha256sum "$file" > "$file.sha256"
          fi
        done
        cd -

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.PROJECT_NAME }} v${{ env.VERSION }}
        tag_name: ${{ github.ref }}
        body: |
          # 🎉 ${{ env.PROJECT_NAME }} v${{ env.VERSION }}
          
          ## 📦 Downloads
          - **Windows x64**: `${{ env.PROJECT_NAME }}-win-x64-v${{ env.VERSION }}.zip`
          - **Windows ARM64**: `${{ env.PROJECT_NAME }}-win-arm64-v${{ env.VERSION }}.zip`
          - **Linux x64**: `${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}.zip`
          - **Linux ARM64**: `${{ env.PROJECT_NAME }}-linux-arm64-v${{ env.VERSION }}.zip`
          - **macOS x64**: `${{ env.PROJECT_NAME }}-osx-x64-v${{ env.VERSION }}.zip`
          - **macOS ARM64**: `${{ env.PROJECT_NAME }}-osx-arm64-v${{ env.VERSION }}.zip`
          
          ## 🔒 Checksums
          File SHA256 checksums are included in `.sha256` files.
          
          ## 🚀 Self-contained executable
          No .NET runtime required - just download, extract and run!
        draft: false
        prerelease: false
        files: |
          artifacts/*.zip
          artifacts/*.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
