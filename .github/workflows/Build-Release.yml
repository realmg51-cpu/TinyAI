name: Build, Release and Test

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*.*.*'  # Khi push tag v1.0.0, v2.1.3, etc.
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_NAME: 'TinyAI'
  PROJECT_PATH: 'src/Main/TinyAI.csproj'
  OUTPUT_DIR: 'publish'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build with ${{ matrix.configuration }}
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration ${{ matrix.configuration }} --no-restore

    - name: Test
      run: dotnet test ${{ env.PROJECT_PATH }} --configuration ${{ matrix.configuration }} --no-build --verbosity normal

  publish-self-contained:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Get version from tag
      id: get_version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "RELEASE_NAME=${{ env.PROJECT_NAME }} v$VERSION" >> $GITHUB_ENV

    - name: Publish for ${{ matrix.runtime }}
      shell: bash
      run: |
        dotnet publish "${{ env.PROJECT_PATH }}" \
          --configuration Release \
          --runtime "${{ matrix.runtime }}" \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:DebugType=none \
          -p:DebugSymbols=false \
          --output "${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}"

    - name: Prepare executable files
      shell: bash
      run: |
        cd "${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}"
        if [ "${{ runner.os }}" = "Windows" ]; then
          # Windows: rename .exe
          for file in *.exe; do
            if [ -f "$file" ]; then
              mv "$file" "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.exe"
              echo "Created: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.exe"
            fi
          done
        else
          # Linux/macOS: rename binary
          if [ -f "${{ env.PROJECT_NAME }}" ]; then
            mv "${{ env.PROJECT_NAME }}" "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}"
            chmod +x "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}"
            echo "Created: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}"
          fi
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}
        path: ${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}/${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}*
        retention-days: 30

  create-release:
    needs: publish-self-contained
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version
      id: get_version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: ${{ env.PROJECT_NAME }}-*-v${{ env.VERSION }}
        merge-multiple: true

    - name: Generate checksums
      shell: bash
      run: |
        cd artifacts
        for file in *; do
          if [ -f "$file" ] && [[ ! "$file" == *.sha256 ]]; then
            sha256sum "$file" > "$file.sha256"
            echo "Generated checksum for $file"
          fi
        done

    - name: Create release body
      run: |
        cat > release_body.md << EOF
        # 🎉 ${{ env.PROJECT_NAME }} v${{ env.VERSION }}
        
        ## 📥 Downloads
        
        ### Windows
        | Architecture | File | Size |
        |-------------|------|------|
        | x64 | [⬇️ ${{ env.PROJECT_NAME }}-win-x64-v${{ env.VERSION }}.exe](./${{ env.PROJECT_NAME }}-win-x64-v${{ env.VERSION }}.exe) | $(du -h artifacts/${{ env.PROJECT_NAME }}-win-x64-v${{ env.VERSION }}.exe | cut -f1) |
        | ARM64 | [⬇️ ${{ env.PROJECT_NAME }}-win-arm64-v${{ env.VERSION }}.exe](./${{ env.PROJECT_NAME }}-win-arm64-v${{ env.VERSION }}.exe) | $(du -h artifacts/${{ env.PROJECT_NAME }}-win-arm64-v${{ env.VERSION }}.exe | cut -f1) |
        
        ### Linux
        | Architecture | File | Size |
        |-------------|------|------|
        | x64 | [⬇️ ${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}](./${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}) | $(du -h artifacts/${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }} | cut -f1) |
        | ARM64 | [⬇️ ${{ env.PROJECT_NAME }}-linux-arm64-v${{ env.VERSION }}](./${{ env.PROJECT_NAME }}-linux-arm64-v${{ env.VERSION }}) | $(du -h artifacts/${{ env.PROJECT_NAME }}-linux-arm64-v${{ env.VERSION }} | cut -f1) |
        
        ### macOS
        | Architecture | File | Size |
        |-------------|------|------|
        | Intel | [⬇️ ${{ env.PROJECT_NAME }}-osx-x64-v${{ env.VERSION }}](./${{ env.PROJECT_NAME }}-osx-x64-v${{ env.VERSION }}) | $(du -h artifacts/${{ env.PROJECT_NAME }}-osx-x64-v${{ env.VERSION }} | cut -f1) |
        | Apple Silicon | [⬇️ ${{ env.PROJECT_NAME }}-osx-arm64-v${{ env.VERSION }}](./${{ env.PROJECT_NAME }}-osx-arm64-v${{ env.VERSION }}) | $(du -h artifacts/${{ env.PROJECT_NAME }}-osx-arm64-v${{ env.VERSION }} | cut -f1) |
        
        ## 🔒 Checksums
        \`\`\`
        $(cat artifacts/*.sha256 2>/dev/null || echo "No checksums available")
        \`\`\`
        
        ## ✨ Features
        - Rule-based AI chatbot
        - Cross-platform support
        - Self-contained (no runtime required)
        - Lightweight and fast
        
        ## 📝 How to use
        
        **Windows**: Double-click the \`.exe\` file
        
        **Linux/macOS**:
        \`\`\`bash
        chmod +x ${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}
        ./${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}
        \`\`\`
        
        ## 📋 Requirements
        - No additional runtime needed
        - Works on any compatible system
        
        ## 💬 Feedback
        If you encounter any issues, please [create an issue](https://github.com/${{ github.repository }}/issues/new).
        EOF

    - name: Create Release (set as latest)
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.PROJECT_NAME }} v${{ env.VERSION }}
        tag_name: ${{ github.ref }}
        body_path: release_body.md
        draft: false
        prerelease: false
        latest: true  # QUAN TRỌNG: Set làm latest release
        files: |
          artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
