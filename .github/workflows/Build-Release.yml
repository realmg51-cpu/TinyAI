name: Build, Release and Test

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_NAME: 'TinyAI'
  PROJECT_PATH: 'src/Main/TinyAI.csproj'
  OUTPUT_DIR: 'publish'

jobs:
  # Job 1: Build và Test với caching
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # Caching NuGet packages
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.fsproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build with ${{ matrix.configuration }}
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration ${{ matrix.configuration }} --no-restore

    # Test với TRX logger
    - name: Test
      run: dotnet test ${{ env.PROJECT_PATH }} --configuration ${{ matrix.configuration }} --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    # Upload test results
    - name: Upload test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results-${{ matrix.configuration }}
        path: '**/*.trx'
        retention-days: 30

  # Job 2: Publish self-contained executable cho nhiều nền tảng
  publish-self-contained:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # Cache cho từng runtime
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-${{ matrix.runtime }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.runtime }}-nuget-
          ${{ runner.os }}-nuget-

    # Validate version format
    - name: Validate version format
      id: get_version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ Invalid version format: $VERSION (must be X.Y.Z)"
          exit 1
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "✅ Valid version: $VERSION"

    # Verify tag signature - ĐÃ FIX LỖI POWERSHELL
    - name: Verify tag signature
      shell: bash
      continue-on-error: true
      run: |
        if command -v git &> /dev/null; then
          git verify-tag ${{ github.ref_name }} 2>/dev/null && echo "✅ Tag signature verified" || echo "⚠️ Tag not signed or cannot verify"
        fi

    - name: Publish for ${{ matrix.runtime }}
      shell: bash
      run: |
        dotnet publish "${{ env.PROJECT_PATH }}" \
          --configuration Release \
          --runtime "${{ matrix.runtime }}" \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:DebugType=none \
          -p:DebugSymbols=false \
          -p:Version=${{ env.VERSION }} \
          --output "${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}"

    - name: Prepare executable files
      shell: bash
      run: |
        cd "${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}"
        
        # Count files before rename
        echo "📁 Files in directory:"
        ls -la
        
        if [ "${{ runner.os }}" = "Windows" ]; then
          # Windows: handle .exe files
          exe_files=(*.exe)
          if [ ${#exe_files[@]} -eq 0 ]; then
            echo "❌ No .exe files found!"
            exit 1
          elif [ ${#exe_files[@]} -gt 1 ]; then
            echo "⚠️ Multiple .exe files found: ${exe_files[*]}"
          fi
          
          # Rename the first .exe file
          mv "${exe_files[0]}" "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.exe"
          echo "✅ Created: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.exe"
        else
          # Linux/macOS: handle binary
          if [ ! -f "${{ env.PROJECT_NAME }}" ]; then
            echo "❌ Binary file ${{ env.PROJECT_NAME }} not found!"
            ls -la
            exit 1
          fi
          
          mv "${{ env.PROJECT_NAME }}" "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}"
          chmod +x "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}"
          echo "✅ Created: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}"
        fi
        
        # Show result
        echo "📁 Final files:"
        ls -la

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}
        path: ${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}/${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}*
        retention-days: 30
        if-no-files-found: error

  # Job 3: Tạo Release với release notes tự động
  create-release:
    needs: publish-self-contained
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Get version
      id: get_version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
        pattern: ${{ env.PROJECT_NAME }}-*-v${{ env.VERSION }}
        merge-multiple: true

    - name: List and verify artifacts
      run: |
        echo "📦 Downloaded artifacts:"
        ls -la artifacts/
        
        # Count files
        file_count=$(ls -1 artifacts/ | wc -l)
        echo "✅ Total files: $file_count"
        
        # Check expected files
        expected_files=(
          "${{ env.PROJECT_NAME }}-win-x64-v${{ env.VERSION }}.exe"
          "${{ env.PROJECT_NAME }}-win-arm64-v${{ env.VERSION }}.exe"
          "${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}"
          "${{ env.PROJECT_NAME }}-linux-arm64-v${{ env.VERSION }}"
          "${{ env.PROJECT_NAME }}-osx-x64-v${{ env.VERSION }}"
          "${{ env.PROJECT_NAME }}-osx-arm64-v${{ env.VERSION }}"
        )
        
        for file in "${expected_files[@]}"; do
          if [ -f "artifacts/$file" ]; then
            size=$(du -h "artifacts/$file" | cut -f1)
            echo "✅ $file ($size)"
          else
            echo "⚠️ Missing: $file"
          fi
        done

    - name: Generate checksums
      shell: bash
      run: |
        cd artifacts
        for file in *; do
          if [ -f "$file" ] && [[ ! "$file" == *.sha256 ]] && [[ ! "$file" == *.md ]]; then
            sha256sum "$file" > "$file.sha256"
            echo "🔐 Generated checksum for $file"
          fi
        done

    - name: Generate changelog
      id: changelog
      shell: bash
      run: |
        # Get previous tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -n "$PREVIOUS_TAG" ]; then
          echo "📝 Generating changelog from $PREVIOUS_TAG to ${{ github.ref_name }}"
          git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD > changelog.md
        else
          echo "📝 No previous tag found, using first release"
          echo "- Initial release" > changelog.md
        fi
        
        # Count commits
        commit_count=$(wc -l < changelog.md)
        echo "✅ Found $commit_count commits"

    - name: Create release body
      run: |
        cat > release_body.md << EOF
        # 🎉 ${{ env.PROJECT_NAME }} v${{ env.VERSION }}
        
        ## 📥 Downloads
        
        ### Windows
        | Architecture | File | Size |
        |--------------|------|------|
        | x64 | [⬇️ ${{ env.PROJECT_NAME }}-win-x64-v${{ env.VERSION }}.exe](./${{ env.PROJECT_NAME }}-win-x64-v${{ env.VERSION }}.exe) | $(du -h artifacts/${{ env.PROJECT_NAME }}-win-x64-v${{ env.VERSION }}.exe 2>/dev/null | cut -f1 || echo 'N/A') |
        | ARM64 | [⬇️ ${{ env.PROJECT_NAME }}-win-arm64-v${{ env.VERSION }}.exe](./${{ env.PROJECT_NAME }}-win-arm64-v${{ env.VERSION }}.exe) | $(du -h artifacts/${{ env.PROJECT_NAME }}-win-arm64-v${{ env.VERSION }}.exe 2>/dev/null | cut -f1 || echo 'N/A') |
        
        ### Linux
        | Architecture | File | Size |
        |--------------|------|------|
        | x64 | [⬇️ ${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}](./${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}) | $(du -h artifacts/${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }} 2>/dev/null | cut -f1 || echo 'N/A') |
        | ARM64 | [⬇️ ${{ env.PROJECT_NAME }}-linux-arm64-v${{ env.VERSION }}](./${{ env.PROJECT_NAME }}-linux-arm64-v${{ env.VERSION }}) | $(du -h artifacts/${{ env.PROJECT_NAME }}-linux-arm64-v${{ env.VERSION }} 2>/dev/null | cut -f1 || echo 'N/A') |
        
        ### macOS
        | Architecture | File | Size |
        |--------------|------|------|
        | Intel | [⬇️ ${{ env.PROJECT_NAME }}-osx-x64-v${{ env.VERSION }}](./${{ env.PROJECT_NAME }}-osx-x64-v${{ env.VERSION }}) | $(du -h artifacts/${{ env.PROJECT_NAME }}-osx-x64-v${{ env.VERSION }} 2>/dev/null | cut -f1 || echo 'N/A') |
        | Apple Silicon | [⬇️ ${{ env.PROJECT_NAME }}-osx-arm64-v${{ env.VERSION }}](./${{ env.PROJECT_NAME }}-osx-arm64-v${{ env.VERSION }}) | $(du -h artifacts/${{ env.PROJECT_NAME }}-osx-arm64-v${{ env.VERSION }} 2>/dev/null | cut -f1 || echo 'N/A') |
        
        ## ✨ What's New
        $(cat changelog.md)
        
        ## 🔒 Checksums
        \`\`\`
        $(cd artifacts && cat *.sha256 2>/dev/null || echo "No checksums available")
        \`\`\`
        
        ## 📦 Self-contained Executable
        - No .NET runtime required
        - Download and run immediately
        - Works on any compatible system
        
        ## 🚀 How to Use
        
        **Windows**:
        - Double-click the \`.exe\` file
        
        **Linux/macOS**:
        \`\`\`bash
        chmod +x ${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}
        ./${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}
        \`\`\`
        
        ## 💬 Feedback
        If you encounter any issues, please [create an issue](https://github.com/${{ github.repository }}/issues/new).
        
        ## 📋 Previous Versions
        See [all releases](https://github.com/${{ github.repository }}/releases) for older versions.
        EOF

    - name: Create Release with GitHub CLI
      run: |
        # Create release with all artifacts
        gh release create v${{ env.VERSION }} \
          --title "${{ env.PROJECT_NAME }} v${{ env.VERSION }}" \
          --notes-file release_body.md \
          --latest \
          artifacts/*
        
        echo "✅ Release v${{ env.VERSION }} created successfully!"
        echo "🔗 https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Verify release
    - name: Verify release
      run: |
        RELEASE_INFO=$(gh release view v${{ env.VERSION }} --json isLatest,name,tagName)
        IS_LATEST=$(echo $RELEASE_INFO | jq -r '.isLatest')
        
        if [ "$IS_LATEST" = "true" ]; then
          echo "✅ Release is set as LATEST!"
        else
          echo "⚠️ Release is NOT latest - check manually"
        fi
        
        echo "📊 Release info: $RELEASE_INFO"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 4: CodeQL Analysis với @v4
  codeql-analysis:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: csharp
        queries: security-and-quality

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build
      run: dotnet build ${{ env.PROJECT_PATH }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:csharp"

    - name: Upload CodeQL results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: codeql-results
        path: results
        retention-days: 30

  # Job 5: Notification on failure
  notify-failure:
    needs: [build-and-test, publish-self-contained, create-release, codeql-analysis]
    if: failure() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Send notification
      run: |
        echo "❌ Workflow failed for ${{ env.PROJECT_NAME }}"
        echo "🔍 Check details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        
        # Add Slack/Discord/Teams webhook here if needed
        # curl -X POST -H 'Content-type: application/json' --data '{"text":"Workflow failed for ${{ env.PROJECT_NAME }}!"}' ${{ secrets.SLACK_WEBHOOK }}
