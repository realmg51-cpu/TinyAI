name: Build, Release and Test

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_NAME: 'TinyAI'
  PROJECT_PATH: 'src/Main/TinyAI.csproj'
  OUTPUT_DIR: 'publish'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build with ${{ matrix.configuration }}
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration ${{ matrix.configuration }} --no-restore

    - name: Test
      run: dotnet test ${{ env.PROJECT_PATH }} --configuration ${{ matrix.configuration }} --no-build --verbosity normal

  publish-self-contained:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Get version from tag
      id: get_version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Publish for ${{ matrix.runtime }}
      shell: bash
      run: |
        dotnet publish "${{ env.PROJECT_PATH }}" \
          --configuration Release \
          --runtime "${{ matrix.runtime }}" \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:DebugType=none \
          -p:DebugSymbols=false \
          --output "${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}"

    - name: Prepare files
      shell: bash
      run: |
        cd "${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}"
        if [ "${{ runner.os }}" = "Windows" ]; then
          for file in *.exe; do
            if [ -f "$file" ]; then
              mv "$file" "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.exe"
            fi
          done
        else
          if [ -f "${{ env.PROJECT_NAME }}" ]; then
            mv "${{ env.PROJECT_NAME }}" "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}"
            chmod +x "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}"
          fi
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}
        path: ${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}/${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}*
        retention-days: 30

  create-release:
    needs: publish-self-contained
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version
      id: get_version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: ${{ env.PROJECT_NAME }}-*-v${{ env.VERSION }}
        merge-multiple: true

    - name: Generate checksums
      shell: bash
      run: |
        cd artifacts
        for file in *; do
          if [ -f "$file" ] && [[ ! "$file" == *.sha256 ]]; then
            sha256sum "$file" > "$file.sha256"
          fi
        done

    - name: Prepare release body
      run: |
        cat > release_body.md << EOF
        # 🎉 ${{ env.PROJECT_NAME }} v${{ env.VERSION }}
        
        ## 📦 Downloads
        
        ### Windows
        - \`${{ env.PROJECT_NAME }}-win-x64-v${{ env.VERSION }}.exe\` - 64-bit
        - \`${{ env.PROJECT_NAME }}-win-arm64-v${{ env.VERSION }}.exe\` - ARM64
        
        ### Linux
        - \`${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}\` - 64-bit
        - \`${{ env.PROJECT_NAME }}-linux-arm64-v${{ env.VERSION }}\` - ARM64
        
        ### macOS
        - \`${{ env.PROJECT_NAME }}-osx-x64-v${{ env.VERSION }}\` - Intel
        - \`${{ env.PROJECT_NAME }}-osx-arm64-v${{ env.VERSION }}\` - Apple Silicon
        
        ## 🔒 Checksums
        SHA256 checksums are included in \`.sha256\` files.
        
        ## 🚀 Self-contained
        No .NET runtime required - download and run!
        EOF

    - name: Create Release with GitHub CLI
      run: |
        gh release create v${{ env.VERSION }} \
          --title "${{ env.PROJECT_NAME }} v${{ env.VERSION }}" \
          --notes-file release_body.md \
          artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
