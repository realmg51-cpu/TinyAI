name: Build, Release and Test

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_NAME: 'TinyAI'
  PROJECT_PATH: 'src/Main/TinyAI.csproj'
  OUTPUT_DIR: 'publish'

jobs:
  # Job 1: Build và Test trên Ubuntu
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build with ${{ matrix.configuration }}
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration ${{ matrix.configuration }} --no-restore

    - name: Test
      run: dotnet test ${{ env.PROJECT_PATH }} --configuration ${{ matrix.configuration }} --no-build --verbosity normal

  # Job 2: Publish self-contained executable cho nhiều nền tảng
  publish-self-contained:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Get version from tag
      id: get_version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Version: $VERSION"

    - name: Publish self-contained for ${{ matrix.runtime }}
      shell: bash
      run: |
        dotnet publish "${{ env.PROJECT_PATH }}" \
          --configuration Release \
          --runtime "${{ matrix.runtime }}" \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:Version="${{ env.VERSION }}" \
          -p:FileVersion="${{ env.VERSION }}" \
          -p:AssemblyVersion="${{ env.VERSION }}" \
          --output "${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}"

    - name: Rename executable (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        cd "${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}"
        # Find and rename the first .exe file
        for file in *.exe; do
          if [ -f "$file" ]; then
            mv "$file" "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}.exe"
            echo "Renamed to ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}.exe"
            break
          fi
        done
        cd -

    - name: Rename executable (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        cd "${{ env.OUTPUT_DIR }}/${{ matrix.runtime }}"
        if [ -f "${{ env.PROJECT_NAME }}" ]; then
          mv "${{ env.PROJECT_NAME }}" "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}"
          echo "Renamed to ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}"
        fi
        cd -

    - name: Create archive (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        cd "${{ env.OUTPUT_DIR }}"
        Compress-Archive -Path "${{ matrix.runtime }}" -DestinationPath "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.zip" -Force
        Write-Host "Created archive: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.zip"

    - name: Create archive (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        cd "${{ env.OUTPUT_DIR }}"
        zip -r "${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.zip" "${{ matrix.runtime }}"
        echo "Created archive: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.zip"

    - name: Upload artifact for release
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}
        path: ${{ env.OUTPUT_DIR }}/${{ env.PROJECT_NAME }}-${{ matrix.runtime }}-v${{ env.VERSION }}.zip
        if-no-files-found: error
        retention-days: 30

  # Job 3: Tạo Release và upload files
  create-release:
    needs: publish-self-contained
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from tag
      id: get_version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Version: $VERSION"

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: ${{ env.PROJECT_NAME }}-*-v${{ env.VERSION }}
        merge-multiple: true

    - name: List downloaded artifacts
      run: ls -la artifacts/

    - name: Generate checksums
      shell: bash
      run: |
        cd artifacts
        for file in *.zip; do
          if [ -f "$file" ]; then
            sha256sum "$file" > "$file.sha256"
            echo "Generated checksum for $file"
          fi
        done
        cd -

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.PROJECT_NAME }} v${{ env.VERSION }}
        tag_name: ${{ github.ref }}
        body: |
          # 🎉 ${{ env.PROJECT_NAME }} v${{ env.VERSION }}
          
          ## 📦 Downloads
          | Platform | File |
          |----------|------|
          | Windows x64 | `${{ env.PROJECT_NAME }}-win-x64-v${{ env.VERSION }}.zip` |
          | Windows ARM64 | `${{ env.PROJECT_NAME }}-win-arm64-v${{ env.VERSION }}.zip` |
          | Linux x64 | `${{ env.PROJECT_NAME }}-linux-x64-v${{ env.VERSION }}.zip` |
          | Linux ARM64 | `${{ env.PROJECT_NAME }}-linux-arm64-v${{ env.VERSION }}.zip` |
          | macOS x64 | `${{ env.PROJECT_NAME }}-osx-x64-v${{ env.VERSION }}.zip` |
          | macOS ARM64 | `${{ env.PROJECT_NAME }}-osx-arm64-v${{ env.VERSION }}.zip` |
          
          ## 🔒 Checksums
          File SHA256 checksums are included in `.sha256` files.
          
          ## 🚀 Self-contained executable
          - **No .NET Runtime required**
          - Download, extract and run immediately
          - Works on any machine
          
          ## ✨ Features
          - Simple rule-based AI chatbot
          - Cross-platform support
          - Lightweight and fast
          
          ## 📝 How to use
          1. Download the file for your operating system
          2. Extract the zip file
          3. Run the executable:
             - **Windows**: Double-click `${{ env.PROJECT_NAME }}-win-x64.exe`
             - **Linux/macOS**: Open terminal and run `./${{ env.PROJECT_NAME }}-linux-x64`
          
          ## 💬 Feedback
          If you encounter any issues, please create an issue on GitHub or join our Discord!
        draft: false
        prerelease: false
        files: |
          artifacts/*.zip
          artifacts/*.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
